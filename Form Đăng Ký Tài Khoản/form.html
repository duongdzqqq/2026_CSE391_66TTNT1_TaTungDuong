<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản Nâng Cao</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>

<form id="registerForm" novalidate>
    <h2>Đăng Ký</h2>

    <div class="form-group">
        <label>Họ và tên <span id="nameCount">0/50</span></label>
        <input type="text" id="fullname" placeholder="Nhập ít nhất 3 ký tự" maxlength="50">
        <span class="error-msg" id="error-fullname"></span>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="name@domain.com">
        <span class="error-msg" id="error-email"></span>
    </div>

    <div class="form-group">
        <label>Số điện thoại</label>
        <input type="text" id="phone" placeholder="0xxxxxxxxx">
        <span class="error-msg" id="error-phone"></span>
    </div>

    <div class="form-group">
        <label>Mật khẩu</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Tối thiểu 8 ký tự">
            <button type="button" id="togglePassword">👁️</button>
        </div>
        <div class="strength-meter"><div id="strength-bar"></div></div>
        <small id="strength-text"></small>
        <span class="error-msg" id="error-password"></span>
    </div>

    <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword">
        <span class="error-msg" id="error-confirmPassword"></span>
    </div>

    <div class="form-group">
        <label>Giới tính</label>
        <input type="radio" name="gender" value="Nam"> Nam
        <input type="radio" name="gender" value="Nữ" style="margin-left: 10px;"> Nữ
        <span class="error-msg" id="error-gender"></span>
    </div>

    <div class="form-group">
        <label style="font-weight: normal;">
            <input type="checkbox" id="terms"> Tôi đồng ý với điều khoản
        </label>
        <span class="error-msg" id="error-terms"></span>
    </div>

    <button type="submit">Đăng ký ngay</button>
</form>

<div id="successMsg" style="display: none; text-align: center;"></div>

<script src="form.js"></script>
</body>
</html>
