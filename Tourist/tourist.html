<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Goals - Landing Page</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="tourist-style.css"> 
</head>
<body>
    <header>
        <div class="logo">TRAVEL GOALS</div>
        <nav class="nav-links">
            <a href="#">Destinations</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>JOE'S TRAVEL PAGE</h1>
                <p>LET'S EXPLORE THE WORLD TOGETHER!</p>
                <button class="btn-discover">Discover places</button>
            </div>
        </section>

        <section class="highlights">
            <h2>Top Destinations</h2>
            <div class="card-container">
                <div class="card">
                    <img src="miami.jpg" alt="Miami">
                    <p>MIAMI <span>USA</span></p>
                </div>
                <div class="card">
                    <img src="munich.jpg" alt="Munich">
                    <p>MUNICH <span>GERMANY</span></p>
                </div>
                <div class="card">
                    <img src="bacelona.png" alt="Barcelona">
                    <p>BARCELONA <span>SPAIN</span></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
        </div>
    </footer>
</body>
</html>
