<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="orderForm" novalidate>
    <h2>📦 Đặt Hàng Trực Tuyến</h2>

    <div class="form-group">
        <label>Sản phẩm:</label>
        <select id="product">
            <option value="">-- Chọn sản phẩm --</option>
            <option value="Laptop">Laptop (20.000.000đ)</option>
            <option value="Smartphone">Smartphone (10.000.000đ)</option>
            <option value="Tablet">Tablet (5.000.000đ)</option>
        </select>
        <span class="error-msg" id="error-product"></span>
    </div>

    <div class="form-group">
        <label>Số lượng (1-99):</label>
        <input type="number" id="quantity" value="1" min="1" max="99">
        <span class="error-msg" id="error-quantity"></span>
    </div>

    <div class="total-area">
        <strong>Tổng tiền: <span id="totalPrice">0</span>đ</strong>
    </div>

    <div class="form-group">
        <label>Ngày giao hàng:</label>
        <input type="date" id="deliveryDate">
        <span class="error-msg" id="error-deliveryDate"></span>
    </div>

    <div class="form-group">
        <label>Địa chỉ giao hàng:</label>
        <input type="text" id="address" placeholder="Ít nhất 10 ký tự">
        <span class="error-msg" id="error-address"></span>
    </div>

    <div class="form-group">
        <label>Ghi chú (<span id="charCount">0/200</span>):</label>
        <textarea id="note" rows="3" placeholder="Ghi chú thêm..."></textarea>
        <span class="error-msg" id="error-note"></span>
    </div>

    <div class="form-group">
        <label>Thanh toán:</label>
        <label><input type="radio" name="payment" value="COD"> COD</label>
        <label><input type="radio" name="payment" value="Chuyển khoản"> Chuyển khoản</label>
        <label><input type="radio" name="payment" value="Ví điện tử"> Ví điện tử</label>
        <span class="error-msg" id="error-payment"></span>
    </div>

    <button type="submit">Đặt hàng ngay</button>
</form>

<div id="confirmModal" style="display:none; border: 2px solid #333; padding: 20px; background: #fff; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); z-index: 100;">
    <h3>Xác nhận đơn hàng?</h3>
    <div id="orderSummary"></div>
    <hr>
    <button id="btnFinalConfirm">Xác nhận</button>
    <button id="btnCancel">Hủy</button>
</div>
<script src="order.js"></script>
</body>
</html>
